# ============================================================================
# DEVELOPMENT ENVIRONMENT SPECIFIC PROPERTIES (-dev)
# ============================================================================

# ============================================================================
# LOCAL POSTGRESQL CONFIGURATIONS
# ============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/eduverse
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# HIBERNATE DDL AUTO & CONSOLE LOGGING
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# LOCAL REDIS CACHING SETTINGS
# ============================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# ============================================================================
# LOCAL FILE STORAGE STRATEGY FALLBACK
# ============================================================================
# Set aws.s3.enabled to false to trigger local folder upload strategy for DX
aws.s3.enabled=false
aws.s3.bucket=eduverse-dev-bucket
aws.s3.region=us-east-1
aws.accessKeyId=DEV_KEY
aws.secretKey=DEV_SECRET
file.upload-dir=uploads

# ============================================================================
# SMTP MAIL PIPELINE CONFIGURATIONS (DEV CREDENTIALS)
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply.eduverse@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================================
# LOGGING AND SERVER CONFIGURATION
# ============================================================================
server.port=8080
logging.level.com.eduverse=DEBUG
logging.level.org.springframework.security=INFO
