# ============================================================================
# PRODUCTION ENVIRONMENT SPECIFIC PROPERTIES (-prod)
# ============================================================================

# ============================================================================
# CLOUD DATABASE SETTINGS (AWS RDS POSTGRESQL / ENVIRONMENT DRIVEN)
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# HIKARI CONNECTION POOL PERFORMANCE TUNING
# ============================================================================
# Maximum active connections allowed in the pool at any time
spring.datasource.hikari.maximum-pool-size=20
# Minimum idle connections kept alive in the pool
spring.datasource.hikari.minimum-idle=5
# Maximum time (in milliseconds) a connection can float idle before release
spring.datasource.hikari.idle-timeout=30000
# Maximum wait time (in milliseconds) for a database connection before throwing a timeout
spring.datasource.hikari.connection-timeout=20000
# Test connection query validation
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================================
# DATABASE SCHEMAS & PRODUCTION HIBERNATE SETTINGS
# ============================================================================
# In production, we strictly VALIDATE the schema. We NEVER use 'update' or 'create-drop' to prevent data loss.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Disable raw SQL log outputs in console logs to avoid bloating disk space and degrading performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================================
# SECURED CLOUD REDIS CONFIGURATIONS
# ============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000

# ============================================================================
# PRODUCTION AWS S3 CLOUD STORAGE STRATEGY
# ============================================================================
# S3 strategy is primary in production uploads
aws.s3.enabled=true
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
file.upload-dir=/tmp/uploads

# ============================================================================
# SMTP EMAIL PIPELINE CONFIGURATIONS (PRODUCTION VARS)
# ============================================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ============================================================================
# PRODUCTION LOGGING LOG RULES
# ============================================================================
server.port=${PORT:8080}
logging.level.com.eduverse=INFO
logging.level.org.springframework.security=WARN
