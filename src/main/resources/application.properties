# ============================================================================
# BASE APPLICATION CONFIGURATIONS (GLOBAL SETTINGS)
# ============================================================================
spring.application.name=eduverse

# ============================================================================
# ACTIVE ENVIRONMENT PROFILE SWITCH
# ============================================================================
# Toggles the active configuration profile.
# Dev: application-dev.properties (local setup with directory storage fallback)
# Prod: application-prod.properties (highly available cloud S3, RDS, Redis, strict pooling)
spring.profiles.active=dev

# ============================================================================
# SPRING BOOT ACTUATOR & MONITORING (OBSERVABILITY)
# ============================================================================
# Exposes vital operational health check, CPU metrics, system info, and environment stats
management.endpoints.web.exposure.include=health,metrics,info,env
# Exposes full sub-component health details (e.g. PostgreSQL status, Redis state)
management.endpoint.health.show-details=always

# ============================================================================
# JWT (JSON WEB TOKEN) KEY DEFAULTS
# ============================================================================
# 256-bit base64-encoded signing key. Overridden in Production via environments.
eduverse.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration set to 24 hours (in milliseconds)
eduverse.jwt.expiration=86400000

# ============================================================================
# SWAGGER / OPENAPI DEFINITIONS
# ============================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ============================================================================
# ASYNC TASK WORKER POOL PARAMETERS
# ============================================================================
async.executor.core-size=5
async.executor.max-size=15
async.executor.queue-capacity=100
async.executor.thread-prefix=EduTask-
